<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="gl-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a9af5"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <linearGradient id="gl-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2daa2d"/>
      <stop offset="100%" stop-color="#107C10"/>
    </linearGradient>
    <linearGradient id="gl-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f04e3e"/>
      <stop offset="100%" stop-color="#D83B01"/>
    </linearGradient>
    <linearGradient id="gl-yellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd040"/>
      <stop offset="100%" stop-color="#FFB900"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="42" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="1" y="1" width="254" height="254" rx="41" fill="none" stroke="white" stroke-width="1" opacity="0.06"/>

  <!-- Windows-style 2×2 flag tiles -->
  <!-- Blue – top left -->
  <rect x="46" y="38" width="74" height="74" rx="7" fill="url(#gl-blue)" filter="url(#shadow)"/>
  <!-- Green – top right -->
  <rect x="136" y="38" width="74" height="74" rx="7" fill="url(#gl-green)" filter="url(#shadow)"/>
  <!-- Red – bottom left -->
  <rect x="46" y="128" width="74" height="74" rx="7" fill="url(#gl-red)" filter="url(#shadow)"/>
  <!-- Yellow – bottom right -->
  <rect x="136" y="128" width="74" height="74" rx="7" fill="url(#gl-yellow)" filter="url(#shadow)"/>

  <!-- Highlight sheen on each tile -->
  <rect x="46" y="38" width="74" height="32" rx="7" fill="white" opacity="0.08"/>
  <rect x="136" y="38" width="74" height="32" rx="7" fill="white" opacity="0.08"/>
  <rect x="46" y="128" width="74" height="32" rx="7" fill="white" opacity="0.08"/>
  <rect x="136" y="128" width="74" height="32" rx="7" fill="white" opacity="0.08"/>

  <!-- Separator line -->
  <line x1="44" y1="222" x2="212" y2="222" stroke="white" stroke-width="1" opacity="0.12"/>

  <!-- Label -->
  <text x="128" y="246"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="19"
        font-weight="700"
        fill="white"
        text-anchor="middle"
        opacity="0.75"
        letter-spacing="4">UUP ISO</text>
</svg>
